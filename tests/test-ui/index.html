<!DOCTYPE html>
<html lang="en" data-theme="sdvd-aqua">
  <head>
    <meta charset="UTF-8" />
    <!-- Must precede every URL-bearing tag below — <base> only affects elements
         after it. Relative "./" resolves assets against the served dir: correct
         for dev, the live runner (root), the offline file:// bundle, and the R2
         per-run subpath. (Holds under hash routing, where the document path is
         stable; switching to history routing would need an absolute <base href>
         injected at publish, since deep routes change the path.) -->
    <base href="./" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/img/logo.svg" />
    <!-- META:BEGIN -->
    <!-- ReportGenerator replaces this block per-run; the workflow fills the
         absolute __OG_URL__/__OG_IMAGE__ sentinels in the published report. -->
    <title>Test Runner</title>
    <meta name="description" content="JunimoServer E2E test report" />
    <meta name="theme-color" content="#6b7280" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="__OG_URL__" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JunimoServer E2E Report" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Test Report" />
    <meta property="og:description" content="JunimoServer E2E test report" />
    <meta property="og:url" content="__OG_URL__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="JunimoServer E2E test report summary" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Test Report" />
    <meta name="twitter:description" content="JunimoServer E2E test report" />
    <meta name="twitter:image" content="__OG_IMAGE__" />
    <meta name="twitter:image:alt" content="JunimoServer E2E test report summary" />
    <!-- META:END -->
    <script>
      // Restore saved theme before first paint to prevent flash
      try {
        const t = localStorage.getItem('ui-theme');
        if (t) { document.documentElement.setAttribute('data-theme', t); }
      } catch {}
    </script>
  </head>
  <body class="min-h-screen bg-base-300 font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
