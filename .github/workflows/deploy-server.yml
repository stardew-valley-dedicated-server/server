name: Deploy Server

on:
  workflow_run:
    workflows: ["Build Preview"]
    types:
      - completed
    branches:
      - master
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - public-test
          # - production
      skip_graceful_shutdown:
        description: 'Skip graceful shutdown (emergency deploy)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare:
    name: Prepare deployment
    # Skip in forks — deploys need our VPS secrets, so a fork run can only fail red.
    if: github.repository == 'stardew-valley-dedicated-server/server'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - name: Build deployment matrix
        id: set-matrix
        env:
          TRIGGER: ${{ github.event_name }}
          SELECTED: ${{ github.event.inputs.environment }}
          WORKFLOW_SUCCESS: ${{ github.event.workflow_run.conclusion }}
        run: |
          # Define deployment targets as JSON
          TARGETS='[
            {"environment": "public-test", "image_tag": "preview", "on_preview": true, "on_release": false}
          ]'
          # {"environment": "production", "image_tag": "latest", "on_preview": false, "on_release": true}

          MATRIX=$(echo "$TARGETS" | jq -c '[.[] | select(
            (env.TRIGGER == "workflow_dispatch" and env.SELECTED == .environment) or
            (env.TRIGGER == "workflow_run" and env.WORKFLOW_SUCCESS == "success" and .on_preview) or
            (env.TRIGGER == "release" and .on_release)
          ) | {environment, image_tag}]')

          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
          echo "has_targets=$([ "$MATRIX" != "[]" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy ${{ matrix.environment }}
    needs: prepare
    if: needs.prepare.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    environment: ${{ matrix.environment }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Graceful shutdown preparation
        if: github.event.inputs.skip_graceful_shutdown != 'true'
        run: |
          echo "::notice::Graceful shutdown hook placeholder for ${{ matrix.environment }}"

      - name: Create .env file
        env:
          DEPLOY_GAME_PORT: ${{ secrets.DEPLOY_GAME_PORT }}
          DEPLOY_VNC_PORT: ${{ secrets.DEPLOY_VNC_PORT }}
          DEPLOY_STEAM_AUTH_PORT: ${{ secrets.DEPLOY_STEAM_AUTH_PORT }}
          DEPLOY_STEAM_USERNAME: ${{ secrets.DEPLOY_STEAM_USERNAME }}
          DEPLOY_STEAM_PASSWORD: ${{ secrets.DEPLOY_STEAM_PASSWORD }}
          DEPLOY_STEAM_REFRESH_TOKEN: ${{ secrets.DEPLOY_STEAM_REFRESH_TOKEN }}
          DEPLOY_VNC_PASSWORD: ${{ secrets.DEPLOY_VNC_PASSWORD }}
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
          DEPLOY_DISCORD_BOT_TOKEN: ${{ secrets.DEPLOY_DISCORD_BOT_TOKEN }}
          DEPLOY_DISCORD_CHAT_CHANNEL_ID: ${{ secrets.DEPLOY_DISCORD_CHAT_CHANNEL_ID }}
        run: |
          echo "::group::Generate .env file for ${{ matrix.environment }}"

          # Validate required secrets. STEAM_PASSWORD/STEAM_REFRESH_TOKEN are
          # intentionally not validated here: steam-auth accepts either one, and
          # the "setup" step fails loudly if neither works.
          missing=""
          [[ -z "$DEPLOY_GAME_PORT" ]] && missing="$missing DEPLOY_GAME_PORT"
          [[ -z "$DEPLOY_VNC_PORT" ]] && missing="$missing DEPLOY_VNC_PORT"
          [[ -z "$DEPLOY_STEAM_AUTH_PORT" ]] && missing="$missing DEPLOY_STEAM_AUTH_PORT"
          [[ -z "$DEPLOY_STEAM_USERNAME" ]] && missing="$missing DEPLOY_STEAM_USERNAME"
          [[ -z "$DEPLOY_VNC_PASSWORD" ]] && missing="$missing DEPLOY_VNC_PASSWORD"
          [[ -z "$DEPLOY_API_KEY" ]] && missing="$missing DEPLOY_API_KEY"
          if [[ -n "$missing" ]]; then
            echo "::error::Missing secrets:$missing"
            echo "Configure these in Settings → Environments → ${{ matrix.environment }}"
            exit 1
          fi

          # Line-by-line so the .env never inherits YAML indentation (no sed strip to drift).
          > .env
          echo "# Auto-generated by GitHub Actions" >> .env
          echo "# Environment: ${{ matrix.environment }}" >> .env
          echo "IMAGE_VERSION=${{ matrix.image_tag }}" >> .env
          echo "STEAM_USERNAME=$DEPLOY_STEAM_USERNAME" >> .env
          echo "STEAM_PASSWORD=$DEPLOY_STEAM_PASSWORD" >> .env
          echo "STEAM_REFRESH_TOKEN=$DEPLOY_STEAM_REFRESH_TOKEN" >> .env
          echo "VNC_PASSWORD=$DEPLOY_VNC_PASSWORD" >> .env
          echo "GAME_PORT=$DEPLOY_GAME_PORT" >> .env
          echo "VNC_PORT=$DEPLOY_VNC_PORT" >> .env
          echo "STEAM_AUTH_PORT=$DEPLOY_STEAM_AUTH_PORT" >> .env
          echo "SERVER_FPS=0" >> .env
          echo "SERVER_TPS=5" >> .env
          echo "# API authentication" >> .env
          echo "API_KEY=$DEPLOY_API_KEY" >> .env
          echo "# Discord bot (optional)" >> .env
          echo "DISCORD_BOT_TOKEN=$DEPLOY_DISCORD_BOT_TOKEN" >> .env
          echo "DISCORD_CHAT_CHANNEL_ID=$DEPLOY_DISCORD_CHAT_CHANNEL_ID" >> .env
          echo "::endgroup::"

      - name: Create deploy directory
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: mkdir -p ~/srv/${{ matrix.environment }}

      - name: Copy files to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: "docker-compose.yml,.env"
          target: ~/srv/${{ matrix.environment }}

      - name: Pull and restart containers
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/srv/${{ matrix.environment }}

            echo "::group::Pull images"
            docker compose pull
            echo "::endgroup::"

            echo "::group::Stop containers"
            docker compose down --timeout 30 || true
            echo "::endgroup::"

            echo "::group::Setup steam-auth and download game"
            docker compose run --rm steam-auth setup
            echo "::endgroup::"

            echo "::group::Start containers"
            docker compose up -d
            echo "::endgroup::"

            echo "::group::Cleanup"
            docker image prune -f
            echo "::endgroup::"

      - name: Verify deployment
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/srv/${{ matrix.environment }}

            echo "::group::Wait for startup"
            sleep 30
            echo "::endgroup::"

            echo "::group::Health check"
            if docker compose ps | grep -qE "unhealthy|Exit"; then
              echo "::error::Container health check failed"
              docker compose logs --tail=50
              exit 1
            fi
            docker compose ps
            echo "::endgroup::"

      - name: Build summary
        run: |
          echo "### Deployed: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ matrix.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ matrix.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            jq -n \
              --arg env "${{ matrix.environment }}" \
              --arg tag "${{ matrix.image_tag }}" \
              --arg commit "${GITHUB_SHA:0:7}" \
              '{
                embeds: [{
                  title: "Server Deployed",
                  color: 3066993,
                  fields: [
                    {name: "Environment", value: $env, inline: true},
                    {name: "Image", value: ("`" + $tag + "`"), inline: true},
                    {name: "Commit", value: ("`" + $commit + "`"), inline: true}
                  ]
                }]
              }' | curl -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
          fi

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            jq -n \
              --arg env "${{ matrix.environment }}" \
              --arg commit "${GITHUB_SHA:0:7}" \
              '{
                embeds: [{
                  title: "Deployment Failed",
                  color: 15158332,
                  fields: [
                    {name: "Environment", value: $env, inline: true},
                    {name: "Commit", value: ("`" + $commit + "`"), inline: true}
                  ]
                }]
              }' | curl -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
          fi
