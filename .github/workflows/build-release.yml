name: Build Release

on:
  push:
    branches:
      - master

concurrency:
  group: build-release
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish:
    name: Build and Publish Docker Image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: sdvd/server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release-please.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          secrets: |
            steam_username=${{ secrets.STEAM_USERNAME }}
            steam_password=${{ secrets.STEAM_PASSWORD }}
            steam_refresh_token=${{ secrets.STEAM_REFRESH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: sdvd/server
          readme-filepath: ./README.md

      - name: Build summary
        run: |
          echo "### Production Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.release-please.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`sdvd/server:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sdvd/server:${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull sdvd/server:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d '{
                "embeds": [{
                  "title": "New Release Published",
                  "color": 5763719,
                  "fields": [
                    {"name": "Version", "value": "`${{ needs.release-please.outputs.tag_name }}`"},
                    {"name": "How to update", "value": "```docker compose pull```"},
                    {"name": "Release Notes", "value": "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }})"}
                  ]
                }]
              }' \
              "$DISCORD_WEBHOOK"
          fi

  build-and-publish-steam-service:
    name: Build Steam Service
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: sdvd/steam-service
      context: ./tools/steam-service
      dockerfile: ./tools/steam-service/Dockerfile
      version: ${{ needs.release-please.outputs.version }}
      additional_tag: latest
      cache_scope: steam-service
    secrets: inherit

  build-and-publish-discord-bot:
    name: Build Discord Bot
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: sdvd/discord-bot
      context: ./tools/discord-bot
      dockerfile: ./tools/discord-bot/Dockerfile
      version: ${{ needs.release-please.outputs.version }}
      additional_tag: latest
      cache_scope: discord-bot
    secrets: inherit

  build-docs:
    name: Build Latest Docs
    needs: build-and-publish
    permissions:
      contents: read
    uses: ./.github/workflows/build-docs.yml
    with:
      version: latest
      image_tag: latest
    secrets: inherit

  deploy-docs:
    name: Deploy Documentation
    needs: build-docs
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    uses: ./.github/workflows/deploy-docs.yml
    with:
      version: latest
    secrets: inherit
