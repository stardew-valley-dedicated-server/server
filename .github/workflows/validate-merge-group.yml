# Runs on merge_group, the event GitHub fires for each entry in the merge queue. The queued
# commit is trusted, already-approved, base-repo code, so there is no fork-secret threat model
# here — hence no `authorize` gate and no environment, unlike validate-pr.yml. This is a separate
# file rather than a trigger added to validate-pr.yml on purpose: the merge_group payload has no
# `github.event.pull_request.*` fields, and one workflow per event keeps one required check per
# name. All six required checks (`Validate Build`, `Validate Commits`, `Validate Line Endings`,
# `Validate PR Title`, `Validate Formatting`, `Validate JS/TS`) are reproduced here under the same
# names: a required check with no merge_group producer leaves every queued PR stuck in
# AWAITING_CHECKS until timeout.
# See docs/developers/contributing/ci-cd.md#validate-pr-pipeline.
name: Validate Merge Group

on:
  merge_group:

permissions:
  contents: read

# Cancel superseded runs for the same merge-queue branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.merge_group.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Build-Context Changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      # On merge_group, paths-filter needs an explicit base/ref (the event provides no PR refs) and
      # a checkout to diff against. The filter is an allowlist of the paths the Docker build context
      # actually consumes (the Dockerfile COPY surface) — keep it in sync with docker/Dockerfile, not
      # with .dockerignore. Must match validate-pr.yml's filter exactly so PR-time and in-queue agree.
      - name: Checkout queue branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          base: ${{ github.event.merge_group.base_sha }}
          ref: ${{ github.event.merge_group.head_sha }}
          filters: |
            docker:
              - 'docker/**'
              - 'mod/**'
              - 'tools/steam-service/**'
              - 'tools/dll-patcher/**'
              - 'tools/netdebug/**'
              - 'tools/openapi-generator/**'
              - 'Directory.Build.props'
              - 'CodeStyle.props'
              - '.editorconfig'

  validate-pr-title:
    name: Validate PR Title
    # The PR title is linted at PR time (validate-pr.yml) and is immutable once the PR is in the
    # queue, so there is nothing to re-lint here — but the required check still needs a merge_group
    # producer to report, or the queue waits on it forever. This job exists solely to satisfy that
    # contract. (The merge_group payload carries no pull_request.title to lint even if we wanted to,
    # and the queue branch holds the PR's original commits, not the squash subject, so Validate
    # Commits doesn't cover the title either.)
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR title was validated at PR time and is immutable in the queue."

  validate-commits:
    name: Validate Commits
    runs-on: ubuntu-latest

    steps:
      # The merge-queue branch lives in the base repo, so checking out head_sha with full history
      # provides both the commits to lint and the tooling (commitlint.config.js, package*.json).
      - name: Checkout queue branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.merge_group.base_sha }} --to ${{ github.event.merge_group.head_sha }} --verbose

  validate-line-endings:
    name: Validate Line Endings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout queue branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}

      # The index is OS-agnostic, so this catches CRLF regardless of the contributor's
      # core.autocrlf. .gitattributes (* text=auto eol=lf) makes LF the committed normal form;
      # a CRLF here means a file was force-added with literal CR bytes, bypassing normalization.
      - name: Check for CRLF in index
        run: |
          if git ls-files --eol | grep -E 'i/crlf'; then
            echo "::error::CRLF line endings found in the index. The repo enforces LF via .gitattributes — re-normalize with: git add --renormalize . && git commit"
            exit 1
          fi
          echo "No CRLF line endings in the index."

  validate-build:
    name: Validate Build
    # Always runs so the required check always reports — but the actual Docker build only runs when
    # the merge group touches the build context (see the `changes` job). A change that can't affect
    # the build context can't affect the build result, so skipping is safe and keeps the check green.
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        if: needs.changes.outputs.docker == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}

      - name: Set up Docker Buildx
        id: buildx
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # type=gha does not persist BuildKit `--mount=type=cache` directories (the Dockerfile uses one
      # for /root/.nuget/packages on every restore), so NuGet re-downloads on each run. actions/cache
      # persists a local dir across runs; inject seeds the mount before the build, extract writes it
      # back after. Mirrors validate-pr.yml so the in-queue build is as cache-warm as the PR build.
      - name: Cache NuGet mount
        id: nuget-cache
        if: needs.changes.outputs.docker == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: nuget-cache-mount
          key: nuget-cache-mount-${{ hashFiles('mod/**/*.csproj', 'tools/steam-service/**/*.csproj', 'Directory.Build.props') }}

      - name: Inject NuGet mount
        if: needs.changes.outputs.docker == 'true'
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          skip-extraction: ${{ steps.nuget-cache.outputs.cache-hit }}

      - name: Build Docker image (validation only)
        if: needs.changes.outputs.docker == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: sdvd/server:mq-${{ github.run_id }}
          secrets: |
            steam_username=${{ secrets.STEAM_USERNAME }}
            steam_password=${{ secrets.STEAM_PASSWORD }}
            steam_refresh_token=${{ secrets.STEAM_REFRESH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract NuGet mount
        if: needs.changes.outputs.docker == 'true' && steps.nuget-cache.outputs.cache-hit != 'true'
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          extract: true

      - name: Build summary
        run: |
          if [ "${{ needs.changes.outputs.docker }}" = "true" ]; then
            echo "### Merge Queue Build Validation Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Queue branch:** \`${{ github.event.merge_group.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.event.merge_group.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Merge Queue Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This merge group does not touch the Docker build context, so the image build was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  validate-format:
    name: Validate Formatting
    # Always runs the full-tree check (no path filter): formatting is fast, and a required
    # check that sometimes doesn't report would stall the queue.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout queue branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-tools-${{ hashFiles('.config/dotnet-tools.json', 'tests/JunimoServer.Tests/*.csproj', 'tests/JunimoServer.TestRunner/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-tools-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check C# formatting
        run: dotnet csharpier check .

      # Analyzer style rules ride compilation, so they only gate where CI compiles
      # C#. The mod projects gate via the Docker image build (Validate Build); the
      # test projects compile game-free, so verify them here. Mirrors validate-pr.yml.
      - name: Check C# analyzer style rules (test projects)
        run: |
          dotnet format style tests/JunimoServer.Tests/JunimoServer.Tests.csproj --severity error --verify-no-changes
          dotnet format style tests/JunimoServer.TestRunner/JunimoServer.TestRunner.csproj --severity error --verify-no-changes

  validate-js:
    name: Validate JS/TS
    runs-on: ubuntu-latest

    steps:
      # persist-credentials off: the job only reads the checkout.
      - name: Checkout queue branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check JS/TS formatting and lints
        run: npx biome ci --max-diagnostics=50 .
