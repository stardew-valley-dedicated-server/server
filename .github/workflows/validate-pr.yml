# Runs on pull_request_target, which is privileged for fork PRs (the workflow file and
# secrets come from the base repo, not the PR head). The `authorize` job gates fork code
# and secrets behind fork-pr reviewer approval, and the validation jobs run only once it
# passes (needs: authorize). Do not add a `pull_request` trigger — a single trigger keeps
# one required check per name. See docs/developers/contributing/ci-cd.md#validate-pr-pipeline.
name: Validate PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - master

permissions:
  contents: read

# Cancel superseded runs for the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  authorize:
    name: Start PR Checks
    # Fork PRs resolve to the 'fork-pr' environment (required reviewer); same-repo + Renovate PRs
    # resolve to an empty string, i.e. no environment — so the gate passes immediately with no approval.
    environment: ${{ github.event.pull_request.head.repo.full_name != github.repository && 'fork-pr' || '' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Fork PRs require maintainer approval before checks run; same-repo PRs run automatically."

  changes:
    name: Detect Build-Context Changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      # paths-filter reads the changed-file list via the GitHub API (it never checks out fork
      # code), so it is safe to run before the authorize gate. The filter is an allowlist of the
      # paths the Docker build context actually consumes (the Dockerfile COPY surface) — keep it
      # in sync with docker/Dockerfile, not with .dockerignore. A path missing here means a build
      # that should have run is skipped, so err toward including.
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'mod/**'
              - 'tools/steam-service/**'
              - 'tools/dll-patcher/**'
              - 'tools/netdebug/**'
              - 'tools/openapi-generator/**'
              - 'Directory.Build.props'

  validate-pr-title:
    name: Validate PR Title
    # Squash-merge makes the PR title the commit subject, which the merge queue lints — but
    # validate-commits lints only the fork's commits, not the title. Lint it here through the same
    # commitlint.config.js so a bad title fails on the PR, not cryptically in the queue. Title-only,
    # no fork code or secrets, so no `authorize` gate.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repo code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            package.json
            package-lock.json
            commitlint.config.js

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title
        # Via env, never interpolated into the script — a title with shell metacharacters is data, not code.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! printf '%s\n' "$PR_TITLE" | npx commitlint --verbose; then
            echo "::error title=Invalid PR title::\"$PR_TITLE\" is not a Conventional Commit. The title becomes the squash commit subject — use e.g. 'feat: add missing game options'. See CONTRIBUTING.md."
            exit 1
          fi

  validate-commits:
    name: Validate Commits
    needs: authorize
    runs-on: ubuntu-latest

    steps:
      # Checks out base-repo files only (default ref under pull_request_target) and reads commit
      # metadata via git fetch — never the fork head — so npm ci runs against trusted lockfiles.
      - name: Checkout base repo code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          sparse-checkout: |
            package.json
            package-lock.json
            commitlint.config.js

      - name: Fetch PR commits
        run: git fetch origin +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  validate-line-endings:
    name: Validate Line Endings
    # Checks out fork head — `needs: authorize` keeps it behind the fork-pr approval gate.
    needs: authorize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # The index is OS-agnostic, so this catches CRLF regardless of the contributor's
      # core.autocrlf. .gitattributes (* text=auto eol=lf) makes LF the committed normal form;
      # a CRLF here means a file was force-added with literal CR bytes, bypassing normalization.
      - name: Check for CRLF in index
        run: |
          if git ls-files --eol | grep -E 'i/crlf'; then
            echo "::error::CRLF line endings found in the index. The repo enforces LF via .gitattributes — re-normalize with: git add --renormalize . && git commit"
            exit 1
          fi
          echo "No CRLF line endings in the index."

  validate-build:
    name: Validate Build
    # Always runs so the required check always reports — but the actual Docker build only runs when
    # the PR touches the build context (see the `changes` job). A PR that can't change the build
    # context can't change the build result, so skipping the build is safe and keeps the check green.
    # Checks out fork head and exposes Steam secrets — `needs: authorize` keeps both behind the
    # fork-pr approval gate. Do not remove `authorize`, and do not add an `environment:` here (that
    # would double-gate forks with a second approval prompt).
    needs: [authorize, changes]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        if: needs.changes.outputs.docker == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        id: buildx
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # type=gha does not persist BuildKit `--mount=type=cache` directories (the Dockerfile uses
      # one for /root/.nuget/packages on every restore), so NuGet re-downloads on each run. The
      # cache-dance bridges that gap: actions/cache persists a local `nuget-cache-mount` dir across
      # runs, the inject step seeds the BuildKit mount from it before the build, and the extract
      # step (after the build) writes the updated mount back for actions/cache to save.
      - name: Cache NuGet mount
        id: nuget-cache
        if: needs.changes.outputs.docker == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: nuget-cache-mount
          key: nuget-cache-mount-${{ hashFiles('mod/**/*.csproj', 'tools/steam-service/**/*.csproj', 'Directory.Build.props') }}

      - name: Inject NuGet mount
        if: needs.changes.outputs.docker == 'true'
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          skip-extraction: ${{ steps.nuget-cache.outputs.cache-hit }}

      - name: Build Docker image (validation only)
        if: needs.changes.outputs.docker == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: sdvd/server:pr-${{ github.event.pull_request.number }}
          secrets: |
            steam_username=${{ secrets.STEAM_USERNAME }}
            steam_password=${{ secrets.STEAM_PASSWORD }}
            steam_refresh_token=${{ secrets.STEAM_REFRESH_TOKEN }}
          # Read-only: reads the shared `server` scope that preview/release builds populate,
          # but never persists (no cache-to) since the validation image is throwaway.
          cache-from: type=gha,scope=server

      - name: Extract NuGet mount
        if: needs.changes.outputs.docker == 'true' && steps.nuget-cache.outputs.cache-hit != 'true'
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          extract: true

      - name: Build summary
        run: |
          if [ "${{ needs.changes.outputs.docker }}" = "true" ]; then
            echo "### Build Validation Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR does not touch the Docker build context, so the image build was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  validate-format:
    name: Validate Formatting
    # Checks out fork head — `needs: authorize` keeps it behind the fork-pr approval gate.
    needs: authorize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-tools-${{ hashFiles('.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-tools-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check C# formatting
        run: dotnet csharpier check .
