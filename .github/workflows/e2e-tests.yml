# Runs the heavy Docker E2E suite (the full suite by default; a `filter` narrows it
# to a class/method). The coordinator (JunimoServer.TestRunner, a net10.0 app) runs
# here on ubuntu-latest; the actual Stardew game containers run on a remote VPS
# reached over SSH — the harness's existing multi-host model with SDVD_DOCKER_HOSTS
# set to a VPS-only fleet.
#
# FOUR ways in — three manual/maintainer-gated, plus one bounded nightly schedule:
#   1. workflow_dispatch (Actions tab) — runs the full suite from a trusted branch; the
#      optional `pr` input instead resolves that PR's HEAD (forks included, gated by
#      `fork-pr`) and posts the same sticky as the comment path.
#   2. `/run-tests-e2e [filter]` PR comment.
#   3. the "Re-run E2E tests" checkbox in the bot's results comment (a click in the
#      PR view; toggling it fires issue_comment: edited).
#   4. schedule (nightly 08:00 UTC) — a full-suite run on master so the README E2E
#      badge has a real, recent master result to show. Trusted (default-branch
#      workflow on master), no PR context; it never gates a merge (see below).
#
# Why this is safe despite touching PRs:
#   - issue_comment ALWAYS runs THIS workflow file from the default branch (master),
#     never the PR/fork version — a fork cannot inject workflow code via a comment.
#   - The `gate` job authorizes the commenter via the repo-permission API (write/admin
#     required; NOT author_association, which is permission-blind). Non-maintainers are
#     refused before any secret-bearing job runs.
#   - The `pr`-input dispatch mode needs no explicit permission check: GitHub already gates
#     workflow_dispatch on repo write, the same bar the commenter check enforces.
#   - Fork PRs additionally pass through the `fork-pr` Environment approval (mirrors
#     validate-pr.yml) before the secret-bearing `e2e` job runs — the VPS private key
#     reaching fork code = root on the test VPS via the docker group.
#   - Single physical VPS runner: a global concurrency singleton QUEUES runs (active +
#     1 waiting); a newer trigger replaces the waiting one, never preempting the active
#     run. To preempt, a maintainer cancels the in-flight run from the Actions tab — that
#     cancel triggers the runner's abort path (writes summary.json, sweeps VPS containers
#     by run-id), and the sticky reports "⚪ aborted".
#   - This workflow must NEVER become a required check (external-VPS availability can't
#     gate the merge queue). The nightly `schedule` is the ONLY automatic trigger and is
#     safe precisely because it doesn't gate anything — it runs on master after the fact,
#     never blocks a merge, and is bounded to one run/day on the single VPS. Do NOT add a
#     merge-coupled trigger (push / pull_request_target / merge_group) or mark any job a
#     required check.
#
# All secrets resolve from the `test-vps` GitHub Environment (the same per-environment
# mechanism deploy-server.yml uses), not loose repo-level secrets. R2_BUCKET /
# R2_PUBLIC_BASE_URL are test-vps *variables* (public by design; see the R2 step).
name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'Test filter (xUnit class/method substring). Empty = run the full suite.'
        required: false
        default: ''
      # string, not number: default: '' is invalid on a numeric input.
      #
      # TODO: axis-B targeting is `pr`-only today. To add branch/commit/tag targeting later,
      # add sibling inputs and a precedence rule in the gate (resolve pr → branch → sha → tag);
      # the e2e checkout already takes a resolved head_sha, so only the gate's resolution grows.
      pr:
        description: 'PR number to test (resolves its HEAD; forks require fork-pr approval). Empty = run the selected branch / master.'
        required: false
        default: ''
  # Nightly full-suite run on master so the README E2E badge reflects a real, recent
  # result. 08:00 UTC is clear of the other crons (CodeQL Wed 07:17; cleanups Sun/Mon
  # 06:00). Handled like workflow_dispatch in the gate (trusted, no PR context).
  schedule:
    - cron: '0 8 * * *'
  # PR comments: `created` = the typed `/run-tests-e2e` command; `edited` = the re-run
  # checkbox in the bot's results comment being ticked. The `gate` job's `if:` narrows
  # this to PR comments that are actually our command or our sticky (see that job).
  issue_comment:
    types: [created, edited]

permissions:
  contents: read

# Concurrency singleton is on the `e2e` JOB, not here. Workflow-level acquires the group
# before any job `if:`, so a no-op comment run (bot edit; gate skips it) would enter the
# group and cancel a maintainer's waiting run. Job-level acquires only when the job starts;
# a skipped `e2e` never starts. Do NOT re-add a workflow-level `e2e-tests-singleton` group —
# a same-name workflow+job group deadlocks.

jobs:
  # ── Authorize + parse + resolve the PR HEAD. NO secrets here; this job decides
  # whether the run is allowed and what it should run, then hands the e2e job a
  # resolved SHA/filter. The `if:` is a coarse pre-filter (GitHub expressions can't do
  # regex); the authoritative checks (anchored command match, maintainer permission,
  # checkbox transition) run inside the github-script step.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # post/update the sticky + reactions
      contents: read
    # NB: use github.event.sender (the actor who triggered the event), NOT
    # github.event.comment.user. On an `edited` checkbox toggle, comment.user is the
    # comment's ORIGINAL author — our own bot sticky — so a comment.user.type != 'Bot'
    # filter would block every re-run. sender is the human who clicked.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment'
       && github.event.issue.pull_request != null
       && github.event.sender.type != 'Bot'
       && (
            (github.event.action == 'created'
               && startsWith(github.event.comment.body, '/run-tests-e2e'))
         || (github.event.action == 'edited'
               && contains(github.event.comment.body, '<!-- e2e-results -->'))
          ))
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
      head_ref: ${{ steps.gate.outputs.head_ref }}
      filter: ${{ steps.gate.outputs.filter }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      is_fork: ${{ steps.gate.outputs.is_fork }}
    steps:
      # Check out ONLY the shared helper script from the (trusted) default branch, so
      # the github-script step can require() it. issue_comment already runs the default-
      # branch workflow; this checkout is the default ref too (never the PR head).
      - name: Checkout gate helper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts/e2e-pr-sticky.js
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Authorize, parse, resolve PR HEAD
        id: gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DISPATCH_FILTER: ${{ inputs.filter }}
          DISPATCH_PR: ${{ inputs.pr }}
        with:
          script: |
            const helper = require('./.github/scripts/e2e-pr-sticky.js');
            const { owner, repo } = context.repo;

            // Shared by the issue_comment and dispatch+pr paths so there is ONE pulls.get +
            // sticky upsert. Refuses a closed/merged PR (GitHub marks merged PRs `closed`) —
            // returns false, caller bails. `commentId` (issue_comment only) is the comment to
            // 👀; `requested` flips the sticky's "(requested)" suffix.
            async function resolveAndQueue({ issueNumber, filter, requested, commentId }) {
              const pr = (await github.rest.pulls.get({ owner, repo, pull_number: issueNumber })).data;
              if (pr.state === 'closed') {
                core.setFailed(`PR #${issueNumber} is closed/merged — refusing to run.`);
                core.setOutput('proceed', 'false');
                return false;
              }
              const headRepo = pr.head.repo ? pr.head.repo.full_name : null;
              const isFork = headRepo !== `${owner}/${repo}`; // null head.repo (deleted fork) => treat as fork

              // 👀 the triggering comment (issue_comment only), then upsert the queued sticky.
              if (commentId) {
                await github.rest.reactions.createForIssueComment({ owner, repo, comment_id: commentId, content: 'eyes' });
              }
              // Read the sticky LIVE (not from context.payload.comment) on BOTH paths: the
              // singleton-queue means a prior run's "Update PR sticky" can append a history row
              // between the checkbox tick and this queued gate's execution, so a payload snapshot
              // would be stale and overwrite that row away. findSticky reads the settled comment.
              const existing = await helper.findSticky({ github, owner, repo, issue_number: issueNumber });
              const history = existing ? helper.readHistory(existing.body) : [];
              await helper.upsertSticky({
                github, owner, repo, issue_number: issueNumber, existing,
                body: helper.renderBody({
                  status: 'queued', statusEmoji: '🟡',
                  headline: `Queued for \`${helper.shortSha(pr.head.sha)}\`…`,
                  filter, history, requested,
                }),
              });

              core.setOutput('proceed', 'true');
              core.setOutput('head_sha', pr.head.sha);
              core.setOutput('head_ref', pr.head.ref);
              core.setOutput('filter', filter);
              core.setOutput('pr_number', String(issueNumber));
              core.setOutput('is_fork', String(isFork));
              return true;
            }

            // ---- workflow_dispatch / schedule (both run the trusted default-branch workflow) ----
            if (context.eventName === 'workflow_dispatch' || context.eventName === 'schedule') {
              const dispatchPr = (process.env.DISPATCH_PR || '').trim();

              // No-PR path (schedule always; dispatch with empty pr): leaving head_sha unset
              // makes the e2e checkout fall back to the default ref (master).
              if (context.eventName === 'schedule' || dispatchPr === '') {
                core.setOutput('proceed', 'true');
                core.setOutput('filter', context.eventName === 'workflow_dispatch' ? (process.env.DISPATCH_FILTER || '') : '');
                core.setOutput('is_fork', 'false');
                return;
              }

              // Dispatch WITH pr. The Actions tab requires repo WRITE to fire workflow_dispatch,
              // so the dispatcher is inherently a maintainer — no isMaintainer call (header comment).
              if (!/^\d+$/.test(dispatchPr) || Number(dispatchPr) <= 0) {
                core.setFailed(`Invalid \`pr\` input ${JSON.stringify(dispatchPr)} — must be a positive integer.`);
                core.setOutput('proceed', 'false');
                return;
              }
              const issueNumber = Number(dispatchPr);

              // Same normalization + validation as the comment path (parseCommand).
              const filter = (process.env.DISPATCH_FILTER || '').trim().split(/\s+/).filter(Boolean).join(' ');
              if (!helper.isValidFilter(filter)) {
                core.setFailed('`filter` input contains disallowed characters.');
                core.setOutput('proceed', 'false');
                return;
              }

              try {
                await resolveAndQueue({ issueNumber, filter, requested: false });
              } catch (err) {
                if (err.status === 404) {
                  core.setFailed(`PR #${issueNumber} not found.`);
                  core.setOutput('proceed', 'false');
                  return;
                }
                throw err; // unexpected API error: fail loudly (closed)
              }
              return; // resolveAndQueue returning false (closed PR) already set proceed=false
            }

            // ---- issue_comment (created command | edited checkbox) ----
            const comment = context.payload.comment;
            const issueNumber = context.payload.issue.number;
            const action = context.payload.action;
            const body = comment.body || '';
            // The ACTOR is the sender (who clicked/commented), not comment.user — on an
            // `edited` checkbox toggle comment.user is the original author (our bot).
            const actor = context.payload.sender.login;

            const noop = (reason) => { core.info(`No-op: ${reason}`); core.setOutput('proceed', 'false'); };

            // Classify + parse (pure logic lives in the helper, where it's unit-tested).
            // These are the cheap, side-effect-free structural filters that decide "is this
            // even our command / our sticky" — they must run BEFORE authorization so an edit
            // to an unrelated comment is ignored silently (no auth API call, no bot reply).
            // Filter validity is recorded here but only ACTED ON after the maintainer check,
            // so a non-maintainer's bad input never elicits a bot reaction (see below).
            let filter = '';
            let filterValid = true;
            if (action === 'created') {
              const cmd = helper.parseCommand(body);
              if (!cmd.isCommand) return noop('comment is not an anchored /run-tests-e2e command');
              filter = cmd.filter;
              filterValid = cmd.valid;
            } else {
              // edited: react only to OUR sticky AND a confirmed unchecked->checked tick.
              if (!body.includes(helper.MARKER)) return noop('edited comment is not the e2e sticky');
              const priorBody = context.payload.changes?.body?.from;
              if (!helper.shouldFireRerun({ priorBody, body })) {
                return noop('re-run box was not just ticked (or prior body unavailable)');
              }
              filter = helper.readFilter(body); // re-run reuses the filter the sticky recorded
            }

            // Authorize the actor (the commenter / the clicker). Authoritative permission
            // API — NOT author_association. 404 (non-collaborator) is a deny. Runs before any
            // bot reaction so a non-maintainer can't elicit one (beyond the deny reply below).
            const allowed = await helper.isMaintainer({ github, owner, repo, username: actor });
            if (!allowed) {
              await github.rest.reactions.createForIssueComment({
                owner, repo, comment_id: comment.id, content: '-1',
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `@${actor} — E2E runs are maintainer-only (repo write access required).`,
              });
              // A non-maintainer ticked the box: disarm it so the sticky doesn't look stuck.
              if (action === 'edited') {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: comment.id,
                  body: helper.resetReRunCheckbox(body),
                });
              }
              return noop(`${actor} is not a maintainer`);
            }

            // Maintainer, but the filter has characters that could break the hidden markers
            // or the markdown table (or that xUnit wouldn't accept). React 'confused' and
            // bail rather than corrupt the sticky. Only reachable on the `created` path.
            if (!filterValid) {
              await github.rest.reactions.createForIssueComment({
                owner, repo, comment_id: comment.id, content: 'confused',
              });
              return noop('filter contains disallowed characters');
            }

            if (!await resolveAndQueue({
              issueNumber, filter, requested: action === 'edited', commentId: comment.id,
            })) return; // closed PR → resolveAndQueue already set proceed=false

  # ── Fork-PR approval gate. Keyed only on is_fork: non-fork runs (same-repo PRs, plain
  # dispatch, schedule) resolve the empty environment (no prompt); fork runs (a fork PR,
  # via comment OR dispatch+pr) resolve `fork-pr`, requiring a maintainer to approve the
  # deployment before the secret-bearing e2e job runs (the VPS key reaching fork code =
  # root on the test VPS). `needs` is permitted in jobs.<id>.environment. Defense in
  # depth atop the gate's permission check.
  authorize:
    name: Authorize (fork-pr)
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.gate.outputs.is_fork == 'true' && 'fork-pr' || '' }}
    steps:
      - run: echo "Authorized — fork=${{ needs.gate.outputs.is_fork }}."

  e2e:
    name: E2E (VPS)
    needs: [gate, authorize]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # Singleton against the one physical VPS runner. cancel-in-progress: false — a maintainer
    # preempts via the Actions tab, never a comment. queue: max FIFO-queues runs instead of
    # the default `single`, which cancels the waiting run when a newer one queues.
    concurrency:
      group: e2e-tests-singleton
      cancel-in-progress: false
      queue: max
    # Holds the Steam + SSH secrets. Mirrors deploy-server.yml's per-environment
    # secret scoping.
    environment: test-vps
    permissions:
      pull-requests: write   # the "Update PR sticky" step posts results back to the PR
      contents: read
    # The runner's own per-test and broker timeouts catch real hangs; this job cap is only
    # a coarse backstop for a wedged process (e.g. a stuck SSH master) that those miss. It
    # matters because of the single-runner concurrency singleton: a zombie run would block
    # the next QUEUED run for as long as it lives, and GitHub's default is 6h. 120 min sits
    # well above a real full-suite run (even serialized at serverSlots:1, plus image build +
    # data transfer) but far below that 6h default, so a hang frees the queue in good time.
    timeout-minutes: 120

    # Non-secret runner config shared by every step. The Steam secrets are scoped
    # to the two steps that consume them (populate + run), not broadcast here.
    env:
      CI: "true"
      # SDVD_IMAGE_TAG=local ⇒ PullPolicy.Never on the VPS (ServerContainer): the
      # VPS never pulls sdvd/server:local from a registry — the run depends
      # entirely on ImageDistributor having streamed the freshly-built image to
      # the VPS daemon (build local → stream → skip-when-digests-match). A
      # broken/skipped distribution surfaces as a container-create "image not
      # found" on the VPS, not a pull retry. Keep this `local`.
      SDVD_IMAGE_TAG: local
      SDVD_STOP_ON_FAIL: "true"
      # Rendering + recording knobs, mirrored from the local .env.test so a CI run
      # behaves like a local `make test` run (watchable video per test). FPS > 0
      # turns on the in-container draw loop AND the video recorder; on this
      # gpu:false VPS the recorder uses libx264 software encoding (no NVENC). The
      # .mp4 clips land under TestResults/runs/ and are uploaded as artifacts.
      # SDVD_TEST_SCREENSHOTS / SDVD_TEST_TRACING are intentionally unset here
      # (as in .env.test) so they take their defaults.
      SERVER_TPS: "5"
      SERVER_FPS: "5"
      CLIENT_TPS: "5"
      CLIENT_FPS: "5"
      SDVD_TEST_RECORDING: all
      DISPLAY_WIDTH: "640"
      DISPLAY_HEIGHT: "360"
      # Consumed by `make build` as --build-arg BUILD_CONFIGURATION (Makefile),
      # inherited by the runner's in-process `make build` subprocess. Not read by
      # any C#. The Makefile default is Debug; pin Release for CI.
      BUILD_CONFIGURATION: Release
      # The harness's host-fleet config — set as ONE GitHub secret in the test-vps
      # environment, exactly as in .env.test, with the SSH private key INLINE in each
      # `sshKey` field (a "-----BEGIN…" block). HostPool materializes the inline key to
      # a 0600 temp file at startup. Shape:
      #   [{"id":"vps","endpoint":"ssh://sdvd-runner@HOST","serverSlots":1,
      #     "clientSlots":2,"gpu":false,
      #     "sshKey":"-----BEGIN OPENSSH PRIVATE KEY-----\n…\n-----END…-----\n"}]
      SDVD_DOCKER_HOSTS: ${{ secrets.SDVD_DOCKER_HOSTS }}

    steps:
      # Enable the containerd image store so `docker save` emits compressed OCI
      # blobs (~60% smaller), shrinking the E2E transfer. Must be first (pre-build).
      # Reconfigure the runner's existing daemon in place rather than
      # docker/setup-docker-action — that action's second daemon splits the build
      # socket from the distributor's _localClient socket (rules/docker-save-format-
      # source-daemon.md). One daemon = build, compose, and _localClient agree.
      - name: Enable containerd image store on the daemon
        run: |
          # Merge into a temp var, not `cat f | tee f` (that pipeline truncates f);
          # `(.features // {})` deep-merges so preinstalled feature keys (buildkit)
          # survive; `|| echo` covers a runner with no daemon.json.
          merged=$(sudo jq '.features = (.features // {}) + {"containerd-snapshotter": true}' \
            /etc/docker/daemon.json 2>/dev/null \
            || echo '{"features": {"containerd-snapshotter": true}}')
          printf '%s\n' "$merged" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break || sleep 1; done
          # Distinguish "daemon never came back" from "store didn't flip" — else the
          # driver check below reports a misleading Driver= empty.
          docker info >/dev/null 2>&1 \
            || { echo "::error::Docker daemon did not respond 30s after restart"; exit 1; }
          # The containerd store reports Driver=overlayfs (classic=overlay2); fail
          # fast if the restart didn't flip it, else save silently uses the ~2.5×
          # legacy format.
          driver=$(docker info --format '{{.Driver}}')
          echo "Storage Driver: $driver"
          [ "$driver" = "overlayfs" ] \
            || { echo "::error::containerd snapshotter not active (Driver=$driver)"; exit 1; }

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # When the gate resolved a PR (comment, checkbox, or dispatch+pr), head_sha is the
          # PR's HEAD — check it out so we test the proposed code, not master (a full SHA
          # fetches a fork commit fine). Otherwise (plain dispatch / schedule) head_sha is
          # empty → checkout's default ref. The default-branch workflow file runs either way.
          ref: ${{ needs.gate.outputs.head_sha }}
          # This job uploads artifacts and publishes a report to a PUBLIC bucket, and
          # no later step needs the git credential, so don't persist it in .git/config
          # (defense in depth — keeps the token out of anything we upload).
          persist-credentials: false

      # SECURITY: the workspace above is PR HEAD — on a fork PR it is untrusted code.
      # The "Update PR sticky" step runs with the test-vps secrets + pull-requests:write,
      # so it must NOT require() the sticky helper from that checkout (a fork could edit it
      # to run arbitrary JS with secrets — CodeQL "Untrusted Checkout TOCTOU"). Pull the
      # helper from the TRUSTED default branch into a separate path and require() that copy.
      # (Building/testing the PR code itself is the intended, fork-pr-gated behaviour; this
      # just avoids handing forks an extra code-execution vector through our own tooling.)
      - name: Checkout trusted sticky helper
        if: needs.gate.outputs.pr_number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts/e2e-pr-sticky.js
          sparse-checkout-cone-mode: false
          persist-credentials: false
          path: trusted-helper

      # The coordinator is a net10.0 app that runs HERE on the runner (the mod
      # builds inside Docker; the runner does not). .NET 10 is GA, so the default
      # quality channel resolves a stable SDK — no preview pin needed.
      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      # Build the test-UI SPA so the runner can assemble the offline web report
      # (test-web) from it after the run. The runner's report path (ReportGenerator,
      # triggered by CI) needs tests/test-ui/dist/index.html to exist; without this
      # step it no-ops with a "SPA dist not found" warning. Mirrors build-docs.yml's
      # Bun setup and `make build-test-ui` (bun install && bun run build →
      # vue-tsc --noEmit && vite build).
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build test-UI SPA
        run: bun install && bun run build
        working-directory: tests/test-ui

      # For the runner's own `make build` (the E2E step), which shells out to
      # `docker buildx build --load`. There is NO separate image-build step in
      # this job — the runner builds all three images (server, test-client,
      # steam-service) in-process.
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # The Dockerfile uses a BuildKit `--mount=type=cache` for /root/.nuget/packages
      # that BuildKit does not persist across runs. The cache-dance bridges that:
      # actions/cache persists a local nuget-cache-mount dir, the inject step seeds
      # the BuildKit mount from it before the build, and the extract step (after)
      # writes the updated mount back. Mirrors validate-pr.yml — but with no
      # `changes`-job gating (this job always builds).
      - name: Cache NuGet mount
        id: nuget-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: nuget-cache-mount
          key: nuget-cache-mount-${{ hashFiles('mod/**/*.csproj', 'tools/steam-service/**/*.csproj', 'Directory.Build.props') }}

      - name: Inject NuGet mount
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          skip-extraction: ${{ steps.nuget-cache.outputs.cache-hit }}

      # Seed known_hosts so the runner's `ssh -M` master is non-interactive. The
      # master spawns with BatchMode=yes and the default known_hosts file (no
      # StrictHostKeyChecking override, TunnelManager.SpawnMasterAsync), so an
      # unknown host key is a hard failure — this keyscan is mandatory, not
      # cosmetic. The host(s) are parsed out of SDVD_DOCKER_HOSTS itself (strip
      # the ssh:// scheme and any user@), so there's no separate host secret to
      # keep in sync. The private key is NOT written here — HostPool materializes
      # the inline `sshKey` to its own 0600 temp file.
      #
      # SECURITY: the jq below extracts ONLY `.endpoint`. Never change it to read
      # `.sshKey` or pipe the raw $SDVD_DOCKER_HOSTS to stdout — that would leak the
      # inline private key into the log. The host is NOT echoed either: it's the VPS IP.
      - name: Trust VPS host key
        env:
          SDVD_DOCKER_HOSTS: ${{ secrets.SDVD_DOCKER_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          hosts=$(printf '%s' "$SDVD_DOCKER_HOSTS" \
            | jq -r '.[] | select(.endpoint) | .endpoint' \
            | sed -E 's#^ssh://##; s#^[^@]*@##')
          if [ -z "$hosts" ]; then
            echo "::error::No ssh:// endpoint found in SDVD_DOCKER_HOSTS — cannot keyscan." >&2
            exit 1
          fi
          count=0
          for h in $hosts; do
            ssh-keyscan -t rsa,ecdsa,ed25519 "$h" >> ~/.ssh/known_hosts 2>/dev/null
            count=$((count + 1))
          done
          echo "Scanned host keys for $count host(s)."
          chmod 644 ~/.ssh/known_hosts

      # Populate the LOCAL server_game-data volume — the precondition for
      # GameDataDistributor, which throws if the local volume is empty (it probes
      # for /data/StardewValley inside it) and otherwise streams it to the VPS.
      # STEAM_ACCOUNTS is the single source of Steam credentials: steam-service's
      # DiscoverAccounts() reads STEAM_ACCOUNTS (JSON) first and only falls back
      # to bare STEAM_USERNAME/PASSWORD when it's absent (tools/steam-service/
      # Program.cs). compose doesn't map STEAM_ACCOUNTS into the steam-auth
      # service, so we forward it with `-e STEAM_ACCOUNTS` (value comes from this
      # step's env, never the command line) — the CI analogue of `make setup`,
      # which injects .env.test (carrying STEAM_ACCOUNTS) via --env-from-file.
      # `download` logs in headlessly (no 2FA on the test accounts → no Steam
      # Guard) and fills /data/game. COMPOSE_PROJECT_NAME=server pins the volume
      # name to the hardcoded `server_game-data` (ServerContainerOptions);
      # IMAGE_VERSION=local makes compose resolve the locally-built
      # sdvd/steam-service:local rather than the :latest default.
      - name: Populate local game-data volume
        env:
          COMPOSE_PROJECT_NAME: server
          IMAGE_VERSION: local
          STEAM_ACCOUNTS: ${{ secrets.STEAM_ACCOUNTS }}
        run: |
          docker compose build steam-auth
          # Drop the sidecar's SDVD_EVENT transport lines from this step's log:
          # they're a machine envelope with no consumer here (unlike the E2E run,
          # nothing tails/forwards a `docker compose run` stdout). Keep the
          # human-readable [SteamService] progress lines. grep is the last pipe
          # stage, so guard the producer's real exit via PIPESTATUS; grep exiting
          # 1 (every line filtered) must not fail the step.
          set -o pipefail
          docker compose run --rm -e STEAM_ACCOUNTS steam-auth download \
            | { grep -v '^SDVD_EVENT ' || true; }
          exit "${PIPESTATUS[0]}"

      # The whole pipeline in one command. The runner builds all three images
      # in-process (reading STEAM_ACCOUNTS[0] for the Steam --secret login),
      # streams them + the game-data volume to the VPS, then runs the tests there.
      # --filter is a substring match against the FQ test name (a class name runs
      # that class); with no filter the full suite runs. STEAM_ACCOUNTS is required
      # here from the very first run — without it the in-process image build fails
      # with a Steam-login error.
      - name: Run E2E suite
        env:
          SDVD_DOCKER_HOSTS: ${{ secrets.SDVD_DOCKER_HOSTS }}
          STEAM_ACCOUNTS: ${{ secrets.STEAM_ACCOUNTS }}
          # Pass the (maintainer-controlled) filter through the environment, not
          # interpolated into the command line, so its value can never be parsed
          # as shell. The gate resolves it from the dispatch input OR the comment /
          # checkbox; empty (the default) runs the full suite — pass --filter only
          # when a non-whitespace value was provided.
          FILTER: ${{ needs.gate.outputs.filter }}
        run: |
          if [ -n "${FILTER//[[:space:]]/}" ]; then
            dotnet run --project ./tests/JunimoServer.TestRunner -- --filter "$FILTER"
          else
            dotnet run --project ./tests/JunimoServer.TestRunner
          fi

      # Render the runner's ctrf-report.json (TestRunArtifactWriter.WriteCtrfReport,
      # one per CI invocation) into the job Summary tab. summary-report = pass/fail
      # table, failed-report = failing tests + errors. The full test-list-report is
      # off — it dwarfs the summary with one row per passing test, and failures are
      # already covered by failed-report.
      # `summary: true` (action default) targets $GITHUB_STEP_SUMMARY. No PR comment —
      # dispatch-only workflow has no PR context. The action defaults exit-on-no-files
      # and exit-on-fail to false, so a missing report (early abort) or failing tests
      # never fail this step; continue-on-error covers an unexpected action error too.
      # if: always() surfaces results from failed/aborted runs.
      - name: Publish CTRF results to job summary
        if: always()
        continue-on-error: true
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # v1.1.0
        with:
          report-path: 'TestResults/runs/**/ctrf-report.json'
          summary-report: true
          failed-report: true

      # After the build (which seeds the BuildKit mount), write the updated NuGet
      # mount back for actions/cache to save. Gated on cache-miss only — matches
      # validate-pr.yml; do NOT add `if: always()`.
      - name: Extract NuGet mount
        if: steps.nuget-cache.outputs.cache-hit != 'true'
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: nuget-cache-mount
          cache-map: |
            {
              "nuget-cache-mount": "/root/.nuget/packages"
            }
          extract: true

      # Per-run artifact tree: summary.json, ctrf-report.json, run-metadata.json,
      # diagnostics/infrastructure.jsonl, tests/{Class}.{Method}/, containers/...
      # (TestArtifacts: TestResults/runs/{timestamp}_{sha}/). Always upload so a
      # failed or aborted run is still inspectable.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: TestResults/runs/
          if-no-files-found: warn

      # Publish the offline web report to Cloudflare R2 for a real, linkable URL
      # (GitHub artifacts aren't URL-addressable — the report can't be viewed without
      # downloading the zip). Served at {R2_PUBLIC_BASE_URL}/e2e/{branch}/{run-id}/
      # index.html; per-branch history expires after 30 days via an R2 bucket
      # lifecycle rule (operator setup), so CI does no pruning.
      #
      # Fully optional and never fails the run: continue-on-error decouples it from the
      # job result, and the body (below) skips cleanly when R2 is unconfigured.
      # The bucket name and public base URL are NOT secret (the bucket is world-readable
      # by design) and are stored as test-vps *variables*, not secrets — both contain a
      # hyphen, and GitHub's secret masker over-masks the `-` substring across the WHOLE
      # log if they're secrets (turning every `-` into ***). Only the credentials (keys /
      # account id, all hex) stay secrets. Do NOT move R2_BUCKET / R2_PUBLIC_BASE_URL back
      # to secrets.
      - name: Publish web report to R2
        id: r2
        if: always()
        continue-on-error: true
        env:
          # The credential pair MUST use the AWS_* names: the aws CLI (R2 speaks the S3
          # API) auto-discovers credentials only from AWS_ACCESS_KEY_ID / _SECRET_ACCESS_KEY.
          # The rest stay R2_* — they're read by the script by hand. The guard below checks
          # these env names (AWS_* for creds), not the secret names that feed them.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          # Prefer the gate-resolved PR head ref so the object key is keyed on the PR's
          # branch — on issue_comment, github.ref_name is the default branch (master).
          BRANCH_REF: ${{ needs.gate.outputs.head_ref || github.ref_name }}
          # "" + "" means a full-suite run against master's committed HEAD (gate no-PR
          # branch leaves head_sha unset; empty filter = no subset). Gates the two README-
          # badge publishes below (badge.json count + the latest/ report mirror) — a
          # PR/filtered run's result isn't representative of master, so it must not move them.
          MASTER_FULL_SUITE: ${{ needs.gate.outputs.head_sha == '' && needs.gate.outputs.filter == '' }}
        run: |
          # GitHub runs steps with `bash -eo pipefail` (errexit ON). Relax it so a
          # partial failure can't truncate the script before the summary write.
          # continue-on-error above is the job-level guarantee; this keeps the body going.
          set +e

          # Unconfigured is the EXPECTED opt-out, not an error. Clean skip, green run.
          # Check the env-var names defined in `env:` above (AWS_* for the credentials).
          if [ -z "${R2_BUCKET:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] \
             || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ] \
             || [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "R2 publish not configured — skipping. The report is still available as the 'e2e-web-report' artifact."
            exit 0
          fi

          # Don't assume the runner image ships the AWS CLI forever.
          if ! command -v aws >/dev/null 2>&1; then
            echo "::warning::aws CLI not found on runner — skipping R2 publish (report still in the artifact)."
            exit 0
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # README E2E badge: a shields.io `endpoint` badge reads this JSON from a stable
          # R2 key. Only a master full-suite run publishes it (head_sha=='' && filter=='';
          # a PR/filtered count isn't representative — see the MASTER_FULL_SUITE comment).
          # Done here (before the report-dir check) so an aborted run with no report bundle
          # still updates the badge. Classification mirrors deriveResult in e2e-pr-sticky.js
          # (aborted > failed > passed). Rides the same e2e/ 30-day lifecycle as latest/.
          if [ "$MASTER_FULL_SUITE" = "true" ]; then
            summary=$(find TestResults/runs/*/summary.json -maxdepth 0 2>/dev/null | head -n1 || true)
            if [ -z "$summary" ] || [ "$(jq -r '.aborted // false' "$summary")" = "true" ]; then
              msg="run aborted"; col="lightgrey"
            else
              passed=$(jq -r '.passed // 0' "$summary")
              failed=$(jq -r '.failed // 0' "$summary")
              if [ "$failed" -gt 0 ]; then
                msg="${failed} failed, ${passed} passed"; col="red"
              else
                msg="${passed} passed"; col="brightgreen"
              fi
            fi
            # badge.json is overwritten in place each run, so bound BOTH caches in series
            # to the shortest shields.io allows: cacheSeconds=300 is its endpoint-badge
            # floor (services/endpoint clamps via Math.max(300, cacheSeconds)), and a
            # matching Cache-Control keeps R2's r2.dev edge from adding latency on top.
            # The R2 object itself updates immediately; only the rendered badge holds ≤5min.
            jq -nc --arg m "$msg" --arg c "$col" \
              '{schemaVersion:1, label:"E2E Tests", message:$m, color:$c, cacheSeconds:300}' > badge.json
            if aws s3 cp badge.json "s3://${R2_BUCKET}/e2e/master/badge.json" \
                 --endpoint-url "$endpoint" --content-type application/json \
                 --cache-control "max-age=300" --no-progress; then
              echo "Updated badge: $msg"
            else
              echo "::warning::badge.json upload failed — README badge may be stale."
            fi
          fi

          # Exactly one run per CI invocation, so the glob resolves a single report dir.
          report_dir=$(find TestResults/runs/*/report -maxdepth 0 -type d 2>/dev/null | head -n1 || true)
          if [ -z "$report_dir" ]; then
            echo "No report bundle to publish (run aborted before assembly?) — skipping."
            exit 0
          fi

          # Sanitize the branch for use as an object-key prefix (slashes -> dashes).
          branch=$(printf '%s' "$BRANCH_REF" | tr '/' '-')
          run_id=$(basename "$(dirname "$report_dir")")
          key="e2e/${branch}/${run_id}"

          # Fill the report's absolute OG sentinels before upload (only this step
          # knows the public URL). # delimiter since URLs contain /. Escape the
          # sed delimiter, &, and \ on the replacement side — a branch name can
          # still contain those after the slash-sanitize above, and they'd
          # otherwise terminate the s### or expand to the matched text.
          esc() { printf '%s' "$1" | sed 's/[#&\\]/\\&/g'; }
          og_url=$(esc "${R2_PUBLIC_BASE_URL%/}/${key}/index.html")
          # ?v=${run_id} cache-busts the og:image so social scrapers re-fetch it for the
          # stable latest/ page (overwritten in place each master run). The stored object
          # key stays og-image.png — the ?v= lives only in the page's meta tag. The query
          # is constant within a run, and survives the latest/ re-point sed below (which
          # rewrites the …/${key}/ path prefix, not the trailing ?v=). og_url stays plain.
          og_image=$(esc "${R2_PUBLIC_BASE_URL%/}/${key}/og-image.png?v=${run_id}")
          sed -i \
            -e "s#__OG_URL__#${og_url}#g" \
            -e "s#__OG_IMAGE__#${og_image}#g" \
            "$report_dir/index.html"

          # sync sets each object's Content-Type from its extension (so index.html
          # renders rather than downloads). 30-day retention is a one-time R2 bucket
          # lifecycle rule (operator setup), not a per-run prune here.
          # max-age=300 bounds how long an already-scraped social cache or r2.dev edge
          # serves stale bytes (matches the badge.json precedent). Harmless on these
          # immutable per-run objects; load-bearing on the latest/ mirror sync below.
          if aws s3 sync "$report_dir" "s3://${R2_BUCKET}/${key}" \
               --endpoint-url "$endpoint" --cache-control "max-age=300" --no-progress; then
            size=$(du -sh "$report_dir" | cut -f1)
            url="${R2_PUBLIC_BASE_URL%/}/${key}/index.html"
            {
              echo "### E2E Web Report"
              echo ""
              echo "**[Open interactive report]($url)** (screenshots + videos, $size)"
            } >> "$GITHUB_STEP_SUMMARY"
            # Hand the URL to the PR-sticky step (no-op on dispatch / when unconfigured).
            echo "report_url=$url" >> "$GITHUB_OUTPUT"
            echo "Published report: $url ($size)"

            # Stable latest/ mirror that the README badge links to — only a master
            # full-suite run moves it (retention caveat: docs e2e-testing.md "Hosted report").
            if [ "$MASTER_FULL_SUITE" = "true" ]; then
              latest_key="e2e/master/latest"
              latest_dir="${report_dir}.latest"
              cp -r "$report_dir" "$latest_dir"
              # The run-id sed above already consumed the sentinels, so re-point the copy's
              # now-absolute OG urls (run-id → latest) so previews of the stable URL self-reference.
              sed -i \
                -e "s#${R2_PUBLIC_BASE_URL%/}/${key}/#${R2_PUBLIC_BASE_URL%/}/${latest_key}/#g" \
                "$latest_dir/index.html"
              if aws s3 sync "$latest_dir" "s3://${R2_BUCKET}/${latest_key}" \
                   --endpoint-url "$endpoint" --cache-control "max-age=300" --no-progress --delete; then
                echo "Updated stable badge report: ${R2_PUBLIC_BASE_URL%/}/${latest_key}/index.html"
              else
                echo "::warning::latest/ mirror sync failed — badge link may be stale (per-run report still published)."
              fi
            fi
          else
            echo "::warning::R2 publish failed (network/credentials/quota). Report remains in the 'e2e-web-report' artifact."
          fi

      # Fallback only: the self-contained offline test-web bundle (test-UI SPA + run
      # snapshot + copied screenshots/videos under report/artifacts/) as a downloadable
      # GitHub artifact. R2 is the primary path (clickable URL); both uploads cost 30s+
      # each, so this runs ONLY when R2 produced no URL — unconfigured, aws missing, no
      # report dir, or sync failure (every such case leaves report_url empty). Reviewers
      # then open report/index.html over file:// from the zip.
      - name: Upload web report (fallback)
        if: always() && steps.r2.outputs.report_url == ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-web-report
          path: TestResults/runs/*/report/
          if-no-files-found: warn

      # Replace the PR sticky with the final result (any run that resolved a PR — comment,
      # checkbox, or dispatch+pr; the `if:` keys on pr_number). Reads the runner's
      # summary.json for counts/status, resets the re-run checkbox to its idle
      # label, and APPENDS a row to the retained run-history table (older rows kept) so
      # the PR keeps a full per-run trail for debugging. if: always() fires on pass, fail,
      # AND cancel (a maintainer preempting the run from the Actions tab) — a sibling status
      # check picks the headline so a cancelled run reports "⚪ aborted" instead of stranding
      # on "🟡 queued". The GITHUB_TOKEN edit does not retrigger the workflow (recursion guard).
      - name: Update PR sticky
        if: always() && needs.gate.outputs.pr_number != ''
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT_URL: ${{ steps.r2.outputs.report_url }}
          FILTER: ${{ needs.gate.outputs.filter }}
          PR_NUMBER: ${{ needs.gate.outputs.pr_number }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          # job.status is success | failure | cancelled at always()-eval time.
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');
            // Trusted (default-branch) copy — NOT the PR-HEAD checkout (see "Checkout
            // trusted sticky helper" above). require() resolves relative to the workspace.
            const helper = require(`${process.env.GITHUB_WORKSPACE}/trusted-helper/.github/scripts/e2e-pr-sticky.js`);
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.PR_NUMBER);
            const sha = helper.shortSha(process.env.HEAD_SHA);
            const filter = process.env.FILTER || '';
            const reportUrl = process.env.REPORT_URL || '';
            const jobStatus = process.env.JOB_STATUS;

            // Find the one summary.json the runner wrote (one run dir per invocation).
            let summary = null;
            const runsDir = 'TestResults/runs';
            for (const dir of (fs.existsSync(runsDir) ? fs.readdirSync(runsDir) : [])) {
              const p = `${runsDir}/${dir}/summary.json`;
              if (fs.existsSync(p)) { try { summary = JSON.parse(fs.readFileSync(p, 'utf8')); } catch {} break; }
            }

            // Derive the result (status, emoji, headline) from the job status + summary.json.
            // Pure logic lives in the helper, where it's unit-tested.
            const { status, statusEmoji, resultEmoji, resultWord, headline } =
              helper.deriveResult({ summary, jobStatus, sha, reportUrl });

            // Append a history row. renderBody caps the retained rows, so derive the run
            // number from the highest existing n (NOT array length, which is bounded).
            const existing = await helper.findSticky({ github, owner, repo, issue_number });
            const history = existing ? helper.readHistory(existing.body) : [];
            const nextN = history.reduce((mx, h) => Math.max(mx, h.n || 0), 0) + 1;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            history.push({
              n: nextN, result: resultWord, resultEmoji, sha,
              filter, when: new Date().toISOString().replace('T', ' ').slice(0, 16) + 'Z',
              runUrl, reportUrl,
            });

            const body = helper.renderBody({
              status, statusEmoji, headline, filter, history, requested: false,
            });
            // Pass `existing` so the write targets the exact comment we read history from
            // (one find per update; no lost-update race against a concurrent edit).
            await helper.upsertSticky({ github, owner, repo, issue_number, body, existing });
