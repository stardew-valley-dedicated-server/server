services:
  # Main game server (Xvfb + WebRTC)
  server:
    build:
      context: ../../
      dockerfile: docker/modern/Dockerfile
      secrets:
        - steam_username
        - steam_password
        - steam_refresh_token
    image: sdvd/server-modern:${IMAGE_VERSION:-latest}
    container_name: sdvd-server-modern
    stdin_open: true
    tty: true
    ports:
      - "${WEBRTC_PORT:-1984}:1984"       # WebRTC web UI
      - "${API_PORT:-8080}:8080"           # Game API
      # Steam relay ports (used by GameServer.Init for relay network)
      - "${GAME_PORT:-24642}:24642/udp"
      - "${QUERY_PORT:-27015}:27015/udp"
    cap_add:
      # Required to sync time, ensures GOG GalaxyAuth works
      - SYS_TIME
      - SYS_PTRACE
    volumes:
      - game-data:/data/game
      - saves:/data/Saves
      - ./.local-container/settings:/data/settings
      - ./diagnostics:/data/diagnostics
    environment:
      # Steam auth service URL (for runtime ticket requests)
      STEAM_AUTH_URL: "http://steam-auth:${STEAM_AUTH_PORT:-3001}"
      # Server configuration
      ALLOW_INSECURE_SETUP: "${ALLOW_INSECURE_SETUP:-false}"
      SERVER_TPS: "${SERVER_TPS:-60}"
      SERVER_FPS: "${SERVER_FPS:-0}"
      # Game settings file path (auto-created with defaults if missing)
      SETTINGS_PATH: "/data/settings/server-settings.json"
      # HTTP API for external tools and automation
      API_ENABLED: "${API_ENABLED:-true}"
      API_PORT: "${API_PORT:-8080}"
      API_KEY: "${API_KEY:-}"
      # Password protection
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      MAX_LOGIN_ATTEMPTS: "${MAX_LOGIN_ATTEMPTS:-3}"
      AUTH_TIMEOUT_SECONDS: "${AUTH_TIMEOUT_SECONDS:-120}"
    depends_on:
      steam-auth:
        condition: service_healthy
    restart: unless-stopped

  steam-auth:
    build:
      context: ../../tools/steam-service
      dockerfile: Dockerfile
    image: sdvd/steam-service:${IMAGE_VERSION:-latest}
    container_name: sdvd-steam-auth-modern
    stdin_open: true
    tty: true
    expose:
      - "${STEAM_AUTH_PORT:-3001}"
    volumes:
      - steam-session:/data/steam-session
      - game-data:/data/game
    environment:
      PORT: "${STEAM_AUTH_PORT:-3001}"
      GAME_DIR: "/data/game"
      SESSION_DIR: "/data/steam-session"
      STEAM_USERNAME: "${STEAM_USERNAME:-}"
      STEAM_PASSWORD: "${STEAM_PASSWORD:-}"
      STEAM_REFRESH_TOKEN: "${STEAM_REFRESH_TOKEN:-}"
    restart: unless-stopped

  # Discord bot for server status display and chat relay
  discord-bot:
    build:
      context: ../../tools/discord-bot
      dockerfile: Dockerfile
    image: sdvd/discord-bot:${IMAGE_VERSION:-latest}
    container_name: sdvd-discord-bot-modern
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      API_URL: "http://server:8080"
      UPDATE_INTERVAL_MS: "30000"
      DISCORD_BOT_NICKNAME: "${DISCORD_BOT_NICKNAME:-}"
      DISCORD_CHAT_CHANNEL_ID: "${DISCORD_CHAT_CHANNEL_ID:-}"
      API_KEY: "${API_KEY:-}"
    depends_on:
      - server
    restart: on-failure

volumes:
  steam-session:
  game-data:
  saves:

secrets:
  steam_username:
    environment: STEAM_USERNAME
  steam_password:
    environment: STEAM_PASSWORD
  steam_refresh_token:
    environment: STEAM_REFRESH_TOKEN
